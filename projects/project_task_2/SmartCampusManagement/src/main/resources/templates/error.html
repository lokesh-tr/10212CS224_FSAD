<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<div class="page-wrapper">

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="error-page">
                <div class="error-code" th:text="${statusCode} ?: '500'">500</div>
                <h2 th:text="${errorTitle} ?: 'Something Went Wrong'">Something Went Wrong</h2>
                <p th:text="${errorMessage} ?: 'An unexpected error occurred. Please try again later.'">Error message</p>
                <div class="btn-group">
                    <a th:href="@{/}" class="btn btn-primary">🏠 Go Home</a>
                    <a href="javascript:history.back()" class="btn btn-outline">← Go Back</a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
