<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<div class="page-wrapper">

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="main-content">
        <div class="container">
            <div class="login-wrapper">
                <div class="glass-card login-card">
                    <h2 class="gradient-text">Admin Login</h2>
                    <p class="login-subtitle">Sign in to manage campus events</p>

                    <div th:if="${param.error}" class="alert alert-error">
                        <span>❌</span>
                        <span>Invalid username or password. Please try again.</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        <span>✅</span>
                        <span>You have been logged out successfully.</span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="form-group">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control"
                                   placeholder="Enter admin username" required autofocus>
                        </div>
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control"
                                   placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                            🔐 Sign In
                        </button>
                    </form>

                    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.8rem;">
                        Default credentials: <code style="color: var(--accent-cyan);">admin / admin123</code>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
