<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Events')}"></head>
<body>
<div class="page-wrapper">

    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="main-content">
        <div class="container">

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="page-title-bar" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem;">
                <div>
                    <h1>📋 Manage <span class="gradient-text">Events</span></h1>
                    <p class="page-subtitle">Create, edit, delete, and search campus events</p>
                </div>
                <a th:href="@{/admin/events/new}" class="btn btn-primary">➕ Create New Event</a>
            </div>

            <!-- Search / Filter Bar -->
            <div class="filter-bar">
                <form th:action="@{/admin/events/search}" th:object="${searchDTO}" method="get">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>Keyword</label>
                            <input type="text" th:field="*{keyword}" class="form-control" placeholder="Search by title...">
                        </div>
                        <div class="filter-group">
                            <label>Department</label>
                            <select th:field="*{department}" class="form-control">
                                <option value="">All Departments</option>
                                <option th:each="dept : ${departments}" th:value="${dept}" th:text="${dept}">Dept</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Event Type</label>
                            <select th:field="*{eventType}" class="form-control">
                                <option value="">All Types</option>
                                <option th:each="type : ${eventTypes}" th:value="${type}" th:text="${type}">Type</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Start Date</label>
                            <input type="date" th:field="*{startDate}" class="form-control">
                        </div>
                        <div class="filter-group">
                            <label>End Date</label>
                            <input type="date" th:field="*{endDate}" class="form-control">
                        </div>
                        <div class="filter-group" style="flex: 0;">
                            <label>&nbsp;</label>
                            <div class="btn-group">
                                <button type="submit" class="btn btn-primary btn-sm">🔍 Search</button>
                                <a th:href="@{/admin/events}" class="btn btn-outline btn-sm">Reset</a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Events Table -->
            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                <div class="empty-icon">📭</div>
                <h3>No events found</h3>
                <p>Try adjusting your search filters or create a new event.</p>
            </div>

            <div th:if="${!#lists.isEmpty(events)}" class="data-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Department</th>
                            <th>Date</th>
                            <th>Venue</th>
                            <th>Registrations</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="event : ${events}">
                            <td th:text="${event.id}">#</td>
                            <td>
                                <span th:text="${event.title}" style="font-weight: 600; color: var(--text-primary);">Title</span>
                            </td>
                            <td>
                                <span th:replace="~{fragments/layout :: eventBadge(${event.eventType})}"></span>
                            </td>
                            <td th:text="${event.department}">Dept</td>
                            <td>
                                <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy')}">Date</span>
                                <br>
                                <small style="color: var(--text-muted);"
                                       th:text="${#temporals.format(event.eventTime, 'hh:mm a')}">Time</small>
                            </td>
                            <td>
                                <span th:text="${event.venue}" style="font-size: 0.85rem;">Venue</span>
                            </td>
                            <td>
                                <span th:text="${event.registeredCount} + ' / ' + ${event.maxCapacity}">0/100</span>
                            </td>
                            <td>
                                <div style="display: flex; gap: 0.4rem;">
                                    <a th:href="@{/admin/events/{id}/edit(id=${event.id})}"
                                       class="btn btn-sm btn-outline" title="Edit">✏️</a>
                                    <a th:href="@{/admin/events/{id}/registrations(id=${event.id})}"
                                       class="btn btn-sm btn-outline" title="Registrations">👥</a>
                                    <form th:action="@{/admin/events/{id}/delete(id=${event.id})}" method="post"
                                          class="delete-form" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-danger" title="Delete">🗑️</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
