<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - ExamPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">ExamPro <span>| Student</span></a>
        <div class="nav-links">
            <span id="userDisplay" style="color: var(--text-muted); margin-right: 1rem;"></span>
            <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container fade-in">
        <h1 class="mb-4">My Dashboard</h1>

        <h2 class="mb-4">Available Exams</h2>
        <div id="examList" class="grid mb-4">
            <!-- Exams load here -->
        </div>

        <h2 class="mt-4 mb-4">My Past Results</h2>
        <div class="glass-panel" style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 1px solid var(--border);">
                        <th style="padding: 1rem;">Exam</th>
                        <th style="padding: 1rem;">Score</th>
                        <th style="padding: 1rem;">Submitted At</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <!-- Results load here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        api.checkAuth('student');
        api.setupNavbar();

        async function loadExams() {
            try {
                const exams = await api.request('/exams');
                const list = document.getElementById('examList');
                list.innerHTML = '';
                exams.forEach(ex => {
                    list.innerHTML += `
                        <div class="card">
                            <h3>${ex.title}</h3>
                            <p>${ex.description || 'No description'}</p>
                            <div class="flex-space">
                                <span style="font-size: 0.875rem; color: var(--text-muted)">ID: ${ex.id}</span>
                                <a href="exam.html?id=${ex.id}" class="btn btn-primary btn-sm">Take Exam</a>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                alert('Failed to load exams');
            }
        }

        async function loadResults() {
            try {
                const results = await api.request('/results/my');
                const tbody = document.getElementById('resultsTableBody');
                tbody.innerHTML = '';

                if (results.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="padding: 1rem; text-align: center; color: var(--text-muted);">No results yet. Go take an exam!</td></tr>`;
                    return;
                }

                results.forEach(r => {
                    const date = new Date(r.submitted_at).toLocaleString();
                    const percentage = Math.round((r.score / r.total_questions) * 100) || 0;
                    tbody.innerHTML += `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                            <td style="padding: 1rem;">${r.title}</td>
                            <td style="padding: 1rem;">${r.score}/${r.total_questions} <span style="color: ${percentage >= 50 ? 'var(--success)' : 'var(--danger)'};">(${percentage}%)</span></td>
                            <td style="padding: 1rem; color: var(--text-muted); font-size: 0.875rem;">${date}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Init
        loadExams();
        loadResults();
    </script>
</body>

</html>
