<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">ExamPro</a>
    </nav>

    <div class="container fade-in"
        style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="glass-panel" style="width: 100%; max-width: 400px;">
            <h2 class="text-center">Welcome Back</h2>
            <p class="text-center">Please sign in to your account</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <div id="errorMsg" style="color: var(--danger); text-align: center; margin-bottom: 1rem;"
                    class="d-none"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <p class="text-center mt-4">Don't have an account? <a href="register.html"
                    style="color: var(--primary);">Register here</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (api.getToken()) {
            const role = localStorage.getItem('role');
            window.location.href = role === 'admin' ? 'admin.html' : 'student.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const data = await api.request('/auth/login', 'POST', { username, password });
                api.setToken(data.token, data.role, data.username);
                window.location.href = data.role === 'admin' ? 'admin.html' : 'student.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
