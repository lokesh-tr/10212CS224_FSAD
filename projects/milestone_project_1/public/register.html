<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ExamPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">ExamPro</a>
    </nav>

    <div class="container fade-in"
        style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
        <div class="glass-panel" style="width: 100%; max-width: 400px;">
            <h2 class="text-center">Create Account</h2>
            <p class="text-center">Join ExamPro today</p>

            <form id="registerForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>I am a:</label>
                    <select id="role" class="form-control">
                        <option value="student">Student</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div id="errorMsg" style="color: var(--danger); text-align: center; margin-bottom: 1rem;"
                    class="d-none"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
            </form>

            <p class="text-center mt-4">Already have an account? <a href="login.html"
                    style="color: var(--primary);">Sign in</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (api.getToken()) {
            const role = localStorage.getItem('role');
            window.location.href = role === 'admin' ? 'admin.html' : 'student.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                await api.request('/auth/register', 'POST', { username, password, role });
                alert('Registration successful! Please sign in.');
                window.location.href = 'login.html';
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
